[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
minversion = 7.0
addopts = -ra --strict-markers
markers =
    unit: unit tests
    integration: integration tests
    slow: slow tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
